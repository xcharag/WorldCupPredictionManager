services:

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    environment:
      PORT: "5000"
      NODE_ENV: production

      # MongoDB — required
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB:-worldcup2026}

      # JWT — required, use a long random string
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # Public URLs — set to your Coolify domain
      # FRONTEND_URL is used for CORS; must match the browser origin
      # BACKEND_URL is used for the Google OAuth callback URL
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}

      # Google OAuth — optional, leave blank to disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # Minio (S3-compatible image storage)
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-worldcup2026}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-}

      # Redis — optional, caches presigned Minio URLs
      REDIS_URL: ${REDIS_URL:-}

      # football-data.org API — optional, enables live score updates + roster sync
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}

      # Email (SMTP) — required for email verification
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    networks:
      - app-net
    env_file:
      - .env

  # ── Frontend (nginx + built React app) ──────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_MINIO_ENDPOINT: ${VITE_MINIO_ENDPOINT:-}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net
      - coolify
    env_file:
      - .env
    labels:
      # Basic Traefik configuration (Coolify will add more labels automatically)
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.services.worldcup-frontend.loadbalancer.server.port=80"
      # Increased timeouts for OAuth and slow connections
      - "traefik.http.services.worldcup-frontend.loadbalancer.server.timeout.read=120s"
      - "traefik.http.services.worldcup-frontend.loadbalancer.server.timeout.write=120s"
      - "traefik.http.services.worldcup-frontend.loadbalancer.server.timeout.idle=120s"

networks:
  app-net:
    driver: bridge
  coolify:
    external: true
