server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so backend hostname is re-resolved dynamically
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container
    location /api/ {
        set $backend http://backend:5000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    90s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        # Retry on connect errors / timeouts (not on POST to avoid duplicate writes)
        proxy_next_upstream   error timeout;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
        # Allow large file uploads (CSV bulk import)
        client_max_body_size 5M;
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
