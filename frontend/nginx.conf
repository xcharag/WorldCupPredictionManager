server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so backend hostname is re-resolved dynamically
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container
    location /api/ {
        set $backend http://backend:5000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Increased timeouts for slow networks and OAuth redirects
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    90s;
        
        # Retry on connect errors / timeouts (not on POST to avoid duplicate writes)
        proxy_next_upstream   error timeout;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 20s;
        
        # Allow large file uploads (CSV bulk import)
        client_max_body_size 5M;
        
        # Buffer settings for better performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # index.html: never cache so the PWA always loads the latest build
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Service worker: never cache so updates are picked up immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vite hashed assets (JS/CSS/fonts/images) — cache for 1 year, immutable
    location ~* ^/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
